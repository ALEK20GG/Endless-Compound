services:
  - type: web
    name: endless-compound
    runtime: docker
    plan: free
    envVars:
      - key: APP_NAME
        value: Endless Compound
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: array
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: endless-compound-db
          property: connectionString

databases:
  - name: endless-compound-db
    plan: free
    databaseName: endless_compound