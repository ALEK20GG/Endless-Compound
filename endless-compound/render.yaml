services:
  - type: web
    name: endless-compound
    runtime: docker
    plan: free
    envVars:
      - key: APP_NAME
        value: Endless Compound
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: array
      - key: DB_CONNECTION
        value: supabase
